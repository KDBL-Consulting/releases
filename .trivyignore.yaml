# Accepted vulnerabilities for the daily container scan.
#
# Entries here are EXCLUDED from the scan report and the alert. Accept a CVE only
# with an honest justification and an expiry (`expired_at`) so it auto-resurfaces
# for re-review. The standard reason below is "no upstream fix available yet" —
