name: container-security-scan

# Daily vulnerability scan of the published KDBL container images. Pulls each
# image from GHCR, scans with Trivy (OS + language dependencies), commits a
# rolling summary that separates ACTIONABLE (a fix is available) from NO-FIX
# (no upstream patch yet) findings, keeps detailed SARIF/JSON as artifacts, and
# raises an issue when there are actionable (fixable) critical/high findings.
#
# Accepted CVEs (e.g. no-fix OS packages, with justification + expiry) live in
# .trivyignore.yaml and are excluded from the report and the alert.
#
# The value is continuous monitoring: CVE feeds update daily, so an image that
# was clean at release can pick up new findings — this catches that, and tells
# you which ones you can actually do something about.
#
# Auth to pull the private packages: set a repo secret `GHCR_READ_TOKEN` (a PAT
# with `read:packages`). Without it the job falls back to the repo GITHUB_TOKEN,
# which only works if each package grants this repo access
# (Package → Package settings → Manage Actions access → add `releases`).
#
# SARIF is kept as artifacts. To surface it in the Security tab, add a
# `github/codeql-action/upload-sarif` step — needs a public repo or GitHub
# Advanced Security on a private one.

on:
  schedule:
    - cron: '17 6 * * *'   # daily 06:17 UTC
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to scan'
        required: false
        default: 'latest'

permissions:
  contents: write   # commit the report
  packages: read    # pull the images (with GITHUB_TOKEN fallback)
  issues: write     # raise an alert issue on actionable findings

concurrency:
  group: security-scan
  cancel-in-progress: false

env:
  ORG: ghcr.io/kdbl-consulting
  IMAGES: 'kdbl-worker kdbl-ui docling-extractor docling-extractor-cuda'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Free disk space + scratch on /mnt (large CUDA image)
        run: |
          # Reclaim space on the small root FS...
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/.ghcup || true
          # ...but the real fix is putting Trivy's cache + tempdir on /mnt, the
          # runner's large ephemeral disk (~70 GB) instead of / (~20 GB). The CUDA
          # image's uncompressed layers blow past root otherwise (no space left).
          sudo mkdir -p /mnt/trivy-cache /mnt/trivy-tmp
          sudo chown -R "$USER" /mnt/trivy-cache /mnt/trivy-tmp
          echo "root:"; df -h / | tail -1
          echo "/mnt:"; df -h /mnt | tail -1

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_READ_TOKEN || github.token }}

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin
          trivy --version

      - name: Scan images
        id: scan
        env:
          TAG: ${{ github.event.inputs.tag || 'latest' }}
          # Keep all of Trivy's heavy I/O (layer extraction scratch) off the small
          # root FS — pairs with --cache-dir below.
          TMPDIR: /mnt/trivy-tmp
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          IGNORE="${GITHUB_WORKSPACE}/.trivyignore.yaml"
          ACCEPTED=$(grep -cE '^[[:space:]]*- id:' "$IGNORE" 2>/dev/null || echo 0)
          mkdir -p artifacts security/history
          REPORT="security/history/scan-${DATE}.md"
          FC_T=0; NC_T=0; FH_T=0; NH_T=0
          {
            echo "# Container security scan — ${DATE}"
            echo
            echo "Scanned \`${TAG}\` of each published image with Trivy (OS + library)."
            echo "Columns split **actionable** (a fixed version exists) from **no-fix** (no upstream"
            echo "patch yet). ${ACCEPTED} accepted CVE(s) are excluded — see [\`.trivyignore.yaml\`](.trivyignore.yaml)."
            echo
            echo "| Image | Critical (fix / no-fix) | High (fix / no-fix) | Medium | Low |"
            echo "| --- | --- | --- | --- | --- |"
          } > "$REPORT"
          # JSON drives the summary + an artifact; `trivy convert` derives SARIF
          # without re-scanning. `--image-src remote` pulls straight from the
          # registry into the /mnt cache (no docker daemon copy + no /tmp
          # docker-export — that double-copy of the multi-GB CUDA image is what
          # exhausted root). Clear the cache between images to bound peak disk.
          for img in $IMAGES; do
            ref="${ORG}/${img}:${TAG}"; f="artifacts/${img}.json"
            echo "::group::scan ${img}"
            trivy image --quiet --scanners vuln --image-src remote \
              --cache-dir /mnt/trivy-cache --ignorefile "$IGNORE" \
              --format json -o "$f" "$ref"
            trivy convert --format sarif --output "artifacts/${img}.sarif" "$f"
            sev() { jq "[.Results[]?.Vulnerabilities[]? | select(.Severity==\"$1\")$2] | length" "$f"; }
            fc=$(sev CRITICAL ' | select((.FixedVersion//"")!="")'); nc=$(sev CRITICAL ' | select((.FixedVersion//"")=="")')
            fh=$(sev HIGH     ' | select((.FixedVersion//"")!="")'); nh=$(sev HIGH     ' | select((.FixedVersion//"")=="")')
            m=$(sev MEDIUM ''); l=$(sev LOW '')
            echo "| \`${img}\` | ${fc} / ${nc} | ${fh} / ${nh} | ${m} | ${l} |" >> "$REPORT"
            FC_T=$((FC_T+fc)); NC_T=$((NC_T+nc)); FH_T=$((FH_T+fh)); NH_T=$((NH_T+nh))
            # Drop the cached layers before the next (possibly huge) image.
            rm -rf /mnt/trivy-cache/* 2>/dev/null || true
            echo "::endgroup::"
          done
          ACTIONABLE=$((FC_T+FH_T))
          {
            echo
            echo "**Actionable (fixed version available — rebuild to clear): ${FC_T} critical, ${FH_T} high.**"
            echo
            echo "No upstream fix yet: ${NC_T} critical, ${NH_T} high (tracked; re-review at expiry)."
            echo
            echo "_Generated by \`.github/workflows/container-security-scan.yml\`. Detailed SARIF + JSON are attached as workflow artifacts._"
          } >> "$REPORT"
          cp "$REPORT" SECURITY-REPORT.md
          {
            echo "date=${DATE}"; echo "actionable=${ACTIONABLE}"
            echo "fix_crit=${FC_T}"; echo "fix_high=${FH_T}"
            echo "nofix_crit=${NC_T}"; echo "nofix_high=${NH_T}"
          } >> "$GITHUB_OUTPUT"
          echo "----- report -----"; cat SECURITY-REPORT.md

      - name: Upload detailed reports (SARIF + JSON)
        uses: actions/upload-artifact@v7
        with:
          name: trivy-reports-${{ steps.scan.outputs.date }}
          path: artifacts/
          retention-days: 30

      - name: Commit summary report
        run: |
          set -euo pipefail
          git config user.name "kdbl-bot"
          git config user.email "security@kdbl.co.uk"
          git add SECURITY-REPORT.md security/history/
          if git diff --cached --quiet; then
            echo "no change to commit"
          else
            git commit -m "security: daily scan ${{ steps.scan.outputs.date }} (actionable: ${{ steps.scan.outputs.fix_crit }} crit / ${{ steps.scan.outputs.fix_high }} high)"
            git push
          fi

      - name: Raise/refresh issue on actionable findings
        if: ${{ steps.scan.outputs.actionable != '0' }}
        env:
          GH_TOKEN: ${{ github.token }}
          FC: ${{ steps.scan.outputs.fix_crit }}
          FH: ${{ steps.scan.outputs.fix_high }}
          DATE: ${{ steps.scan.outputs.date }}
        run: |
          set -euo pipefail
          title="Security: ${FC} critical / ${FH} high fixable finding(s) in published images"
          body="Daily Trivy scan on ${DATE} found **${FC} critical** and **${FH} high** finding(s) that have a **fixed version available** — rebuild the affected image(s) to clear them. See \`SECURITY-REPORT.md\` and the workflow artifacts for detail. (No-fix CVEs are tracked in \`.trivyignore.yaml\`.)"
          gh label create security-scan --color B60205 --description "Automated container scan findings" 2>/dev/null || true
          existing=$(gh issue list --label security-scan --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "${existing:-}" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "$title" --body "$body" --label security-scan
          fi

      - name: Close the scan issue when clean
        if: ${{ steps.scan.outputs.actionable == '0' }}
        env:
          GH_TOKEN: ${{ github.token }}
          DATE: ${{ steps.scan.outputs.date }}
        run: |
          set -euo pipefail
          # Auto-resolve the alert once there are no fixable findings left, so a
          # stale issue doesn't linger after the images are patched. The raise
          # step above reopens/recreates it if a fixable critical/high reappears.
          existing=$(gh issue list --label security-scan --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "${existing:-}" ]; then
            gh issue comment "$existing" --body "Daily Trivy scan on ${DATE}: **0 actionable (fixable) findings** — all clear. Closing automatically. (No-fix CVEs remain tracked in \`.trivyignore.yaml\`.)"
            gh issue close "$existing"
          fi
