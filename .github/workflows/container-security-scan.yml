name: container-security-scan

# Daily vulnerability scan of the published KDBL container images. Pulls each
# image from GHCR, scans with Trivy (OS + language dependencies, all
# severities), commits a dated summary report, keeps the detailed SARIF/JSON as
# downloadable artifacts, and raises an issue if any CRITICAL is found.
#
# The value is continuous monitoring: the CVE feeds update daily, so an image
# that was clean at release can pick up new criticals later — this catches that.
#
# Auth to pull the private packages: set a repo secret `GHCR_READ_TOKEN` (a PAT
# with `read:packages`). Without it, the job falls back to the repo GITHUB_TOKEN,
# which only works if each package grants this repo access
# (Package → Package settings → Manage Actions access → add `releases`).
#
# Surfacing in the Security tab: SARIF is kept as artifacts here. To push it to
# the Security tab, add a `github/codeql-action/upload-sarif` step — that needs a
# public repo, or GitHub Advanced Security on a private one.

on:
  schedule:
    - cron: '17 6 * * *'   # daily 06:17 UTC
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to scan'
        required: false
        default: 'latest'

permissions:
  contents: write   # commit the report
  packages: read    # pull the images (with GITHUB_TOKEN fallback)
  issues: write     # raise an alert issue on criticals

concurrency:
  group: security-scan
  cancel-in-progress: false

env:
  ORG: ghcr.io/kdbl-consulting
  IMAGES: 'kdbl-worker kdbl-ui docling-extractor docling-extractor-cuda'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (large CUDA image)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/.ghcup || true
          df -h / | tail -1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_READ_TOKEN || github.token }}

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin
          trivy --version

      - name: Scan images
        id: scan
        env:
          TAG: ${{ github.event.inputs.tag || 'latest' }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p artifacts security/history
          REPORT="security/history/scan-${DATE}.md"
          CRIT_TOTAL=0; HIGH_TOTAL=0
          {
            echo "# Container security scan — ${DATE}"
            echo
            echo "Scanned \`${TAG}\` of each published image with Trivy (OS + library, all severities)."
            echo
            echo "| Image | Critical | High | Medium | Low | Unknown |"
            echo "| --- | --- | --- | --- | --- | --- |"
          } > "$REPORT"
          # Pull → scan → remove per image so peak disk stays bounded (the CUDA
          # image is multi-GB). One scan each: JSON drives the summary + an
          # artifact, then `trivy convert` derives SARIF without re-scanning.
          for img in $IMAGES; do
            ref="${ORG}/${img}:${TAG}"
            echo "::group::scan ${img}"
            docker pull -q "$ref"
            trivy image --quiet --scanners vuln --format json -o "artifacts/${img}.json" "$ref"
            trivy convert --format sarif --output "artifacts/${img}.sarif" "artifacts/${img}.json"
            counts=$(jq -r '[.Results[]?.Vulnerabilities[]?.Severity] | group_by(.) | map({key:.[0], value:length}) | from_entries' "artifacts/${img}.json")
            c=$(jq -r '.CRITICAL // 0' <<<"$counts"); h=$(jq -r '.HIGH // 0' <<<"$counts")
            m=$(jq -r '.MEDIUM // 0' <<<"$counts"); l=$(jq -r '.LOW // 0' <<<"$counts"); u=$(jq -r '.UNKNOWN // 0' <<<"$counts")
            echo "| \`${img}\` | ${c} | ${h} | ${m} | ${l} | ${u} |" >> "$REPORT"
            CRIT_TOTAL=$((CRIT_TOTAL + c)); HIGH_TOTAL=$((HIGH_TOTAL + h))
            docker image rm "$ref" >/dev/null 2>&1 || true
            echo "::endgroup::"
          done
          {
            echo
            echo "**Totals:** ${CRIT_TOTAL} critical, ${HIGH_TOTAL} high."
            echo
            echo "_Generated by \`.github/workflows/container-security-scan.yml\`. Detailed SARIF + JSON are attached as workflow artifacts._"
          } >> "$REPORT"
          cp "$REPORT" SECURITY-REPORT.md
          {
            echo "crit=${CRIT_TOTAL}"; echo "high=${HIGH_TOTAL}"; echo "date=${DATE}"
          } >> "$GITHUB_OUTPUT"
          echo "----- report -----"; cat SECURITY-REPORT.md

      - name: Upload detailed reports (SARIF + JSON)
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports-${{ steps.scan.outputs.date }}
          path: artifacts/
          retention-days: 30

      - name: Commit summary report
        run: |
          set -euo pipefail
          git config user.name "kdbl-bot"
          git config user.email "security@kdbl.co.uk"
          git add SECURITY-REPORT.md security/history/
          if git diff --cached --quiet; then
            echo "no change to commit"
          else
            git commit -m "security: daily scan ${{ steps.scan.outputs.date }} (crit=${{ steps.scan.outputs.crit }}, high=${{ steps.scan.outputs.high }})"
            git push
          fi

      - name: Raise/refresh issue on CRITICAL findings
        if: ${{ steps.scan.outputs.crit != '0' }}
        env:
          GH_TOKEN: ${{ github.token }}
          CRIT: ${{ steps.scan.outputs.crit }}
          HIGH: ${{ steps.scan.outputs.high }}
          DATE: ${{ steps.scan.outputs.date }}
        run: |
          set -euo pipefail
          title="Security: ${CRIT} critical finding(s) in published images"
          body="Daily Trivy scan on ${DATE} found **${CRIT} critical** and **${HIGH} high** finding(s) across the published images. See \`SECURITY-REPORT.md\` and the workflow artifacts for detail."
          gh label create security-scan --color B60205 --description "Automated container scan findings" 2>/dev/null || true
          existing=$(gh issue list --label security-scan --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "${existing:-}" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "$title" --body "$body" --label security-scan
          fi
